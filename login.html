<!DOCTYPE html>
<html>
<body>

<button onclick="login()">Login</button>

<script>
async function login() {
  try {
    const response = await fetch(
      "http://localhost:5000/api/auth/login",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: "deepu@test.com",
          password: "Test123"
        })
      }
    );

    const text = await response.text();

    alert(text);
    console.log(text);

  } catch (err) {
    alert(err.message);
  }
}
</script>

</body>
</html>
